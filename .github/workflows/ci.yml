name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - "src/sleap_roots_training/**"
      - "tests/**"
      - ".github/workflows/ci.yml"
      - "pyproject.toml"
  push:
    branches: [main]
    paths:
      - "src/sleap_roots_training/**"
      - "tests/**"
      - ".github/workflows/ci.yml"
      - "pyproject.toml"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: false

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run Black
        run: uv run black --check src/sleap_roots_training tests

      - name: Run Ruff
        run: uv run ruff check src/sleap_roots_training

  tests:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu", "windows", "mac"]
        python: ["3.11", "3.12"]
        include:
          - os: ubuntu
            runs-on: ubuntu-latest
          - os: windows
            runs-on: windows-latest
          - os: mac
            runs-on: macos-14

    name: Tests (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: false

      - name: Set up Python
        run: uv python install ${{ matrix.python }}

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run pytest
        run: |
          uv run pytest --cov=src/sleap_roots_training --cov-report=xml --durations=20 -m "not integration" tests/
