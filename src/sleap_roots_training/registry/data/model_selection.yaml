# Production model selection matrix for the sleap-roots pipeline.
#
# Source of truth: models-downloader `model_chooser_table.xlsx` (snapshot 20250204).
#   Repo:  https://gitlab.com/salk-tm/models-downloader
#   Table: tests/data/models_downloader_input/20250204_models/model_chooser_table.xlsx
# Verified against the live xlsx on 2026-07-04.
#
# `age` is the native chooser comma-list; chooser.py parses it to age_min/age_max
# (a contiguous window). Absent root-type slots are `null`.
#
# `checksums` pins each source `<model_id>.zip` by SHA256 so the published
# `weights_checksum` (the whole-artifact digest) is deterministic for this snapshot.
# Regenerate with the documented sha256 helper on a snapshot update.
#
# The arabidopsis `plate` row (arabidopsis_plates/primary + /lateral) is OMITTED:
# those models are absent from the snapshot and have no concrete `.n=` id.
# Tracked by talmolab/sleap-roots-training#3.

